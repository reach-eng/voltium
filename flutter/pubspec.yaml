name: voltium_rider
description: Voltium EV Rental — Rider App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  json_annotation: ^4.9.0

  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  http: ^1.2.2
  intl: ^0.20.2
  path: ^1.9.0
  google_fonts: ^6.2.1
  connectivity_plus: ^6.1.0
  flutter_svg: ^2.0.16
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_secure_storage: ^9.2.2
  geolocator: ^13.0.1
  image: ^4.3.0
  image_picker: ^1.1.2
  share_plus: ^12.0.2
  url_launcher: ^6.3.1
  permission_handler: ^12.0.1
  crypto: ^3.0.6
  pdf: ^3.10.0
  path_provider: ^2.1.0
  image_cropper: ^8.0.2
  local_auth: ^2.3.0
  sqflite: ^2.4.1
  flutter_local_notifications: ^18.0.1
  lottie: ^3.3.1
  fl_chart: ^0.70.2
  confetti: ^0.8.0
  flutter_contacts: ^1.1.9+2
  call_log: ^6.0.1
  dotted_border: ^3.1.0
  flutter_background_service: ^5.0.10
  flutter_background_service_android: ^6.2.7

dev_dependencies:
  saropa_lints: ^9.1.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  integration_test:
    sdk: flutter
  flutter_driver:
    sdk: flutter
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  mocktail: ^1.0.5
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#0053C1"
  adaptive_icon_foreground: "assets/app_icon.png"

flutter_native_splash:
  color: "#0053C1"
  image: assets/app_icon.png
  android_12:
    color: "#0053C1"
    image: assets/app_icon.png
  android: true
  ios: true
  web: false

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/
    - assets/images/
    - lib/l10n/
