version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: voltfleet-staging-db
    restart: always
    environment:
      POSTGRES_USER: voltfleet_staging
      POSTGRES_PASSWORD: ${STAGING_DB_PASSWORD:-voltfleet_staging_password}
      POSTGRES_DB: voltfleet_staging
    ports:
      - '5433:5432' # different port from production to avoid conflicts
    volumes:
      - pgdata_staging:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U voltfleet_staging -d voltfleet_staging']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: voltfleet-staging-redis
    restart: always
    ports:
      - '6380:6379' # different port from production to avoid conflicts
    volumes:
      - redisdata_staging:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    container_name: voltfleet-staging-migrate
    environment:
      NODE_ENV: production
      APP_ENV: staging
      DATABASE_URL: postgresql://voltfleet_staging:${STAGING_DB_PASSWORD:-voltfleet_staging_password}@db:5432/voltfleet_staging?schema=public
    entrypoint: ["npx", "prisma", "migrate", "deploy"]
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voltfleet-staging-web
    restart: always
    ports:
      - '8082:8081'
    environment:
      NODE_ENV: production
      APP_ENV: staging
      DATABASE_URL: postgresql://voltfleet_staging:${STAGING_DB_PASSWORD:-voltfleet_staging_password}@db:5432/voltfleet_staging?schema=public
      DATABASE_POOL_SIZE: '10'
      DATABASE_POOL_TIMEOUT: '30'
      JWT_SECRET: ${JWT_SECRET}
      UPSTASH_REDIS_REST_URL: http://redis:6379
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN:-}
      SMS_PROVIDER: mock
      STORAGE_PROVIDER: local
      CRON_SECRET: ${CRON_SECRET}
      SENTRY_DSN: ${SENTRY_DSN:-}
      NEXT_PUBLIC_APP_URL: http://localhost:8082
      NEXT_PUBLIC_ENABLE_REFERRAL: 'true'
      LOG_LEVEL: debug
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - uploads_staging:/app/public/uploads

  # Staging workers for background job processing
  # Build workers first: npx esbuild src/server/workers/index.ts --bundle --platform=node --outfile=dist/workers.js
  workers:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voltfleet-staging-workers
    restart: always
    command: node dist/workers.js
    environment:
      NODE_ENV: production
      APP_ENV: staging
      DATABASE_URL: postgresql://voltfleet_staging:${STAGING_DB_PASSWORD:-voltfleet_staging_password}@db:5432/voltfleet_staging?schema=public
      JWT_SECRET: ${JWT_SECRET}
      UPSTASH_REDIS_REST_URL: http://redis:6379
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN:-}
      SMS_PROVIDER: mock
      STORAGE_PROVIDER: local
      CRON_SECRET: ${CRON_SECRET}
      LOG_LEVEL: debug
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata_staging:
  redisdata_staging:
  uploads_staging:
