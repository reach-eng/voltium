version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: voltfleet-prod-db
    restart: always
    environment:
      POSTGRES_USER: voltfleet_prod
      POSTGRES_PASSWORD: ${PROD_DB_PASSWORD:?PROD_DB_PASSWORD is required}
      POSTGRES_DB: voltfleet_prod
    ports:
      - '127.0.0.1:5432:5432' # bind to localhost only — no external access
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
      - ./db/backups:/backups
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U voltfleet_prod -d voltfleet_prod']
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: voltfleet-prod-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redisdata_prod:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  migrate:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: migrate
    container_name: voltfleet-prod-migrate
    environment:
      NODE_ENV: production
      APP_ENV: production
      DATABASE_URL: postgresql://voltfleet_prod:${PROD_DB_PASSWORD:?}@db:5432/voltfleet_prod?schema=public
    entrypoint: ["npx", "prisma", "migrate", "deploy"]
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: voltfleet-prod-web
    restart: always
    ports:
      - '127.0.0.1:8081:8081'
    environment:
      NODE_ENV: production
      APP_ENV: production
      DATABASE_URL: postgresql://voltfleet_prod:${PROD_DB_PASSWORD:?}@db:5432/voltfleet_prod?schema=public&pool_timeout=30&connection_limit=15
      DATABASE_POOL_SIZE: '15'
      DATABASE_POOL_TIMEOUT: '30'
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      UPSTASH_REDIS_REST_URL: http://:${REDIS_PASSWORD:?}@redis:6379
      LOG_LEVEL: info
      CRON_SECRET: ${CRON_SECRET:?CRON_SECRET is required}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SMS_PROVIDER: ${SMS_PROVIDER:-mock}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      GCS_BUCKET_NAME: ${GCS_BUCKET_NAME:-}
      NEXT_PUBLIC_APP_URL: ${SITE_URL:-http://localhost:8081}
      NEXT_PUBLIC_ENABLE_REFERRAL: 'true'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - uploads_prod:/app/public/uploads
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # Workers are started by the web service via a separate process.
  # In production, workers should be built as a standalone bundle.
  # Build: npx esbuild src/server/workers/index.ts --bundle --platform=node --outfile=dist/workers.js
  # Then run: node dist/workers.js
  workers:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: voltfleet-prod-workers
    restart: always
    command: node dist/workers.js
    environment:
      NODE_ENV: production
      APP_ENV: production
      DATABASE_URL: postgresql://voltfleet_prod:${PROD_DB_PASSWORD:?}@db:5432/voltfleet_prod?schema=public
      JWT_SECRET: ${JWT_SECRET:?}
      UPSTASH_REDIS_REST_URL: http://:${REDIS_PASSWORD:?}@redis:6379
      SMS_PROVIDER: ${SMS_PROVIDER:-mock}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      LOG_LEVEL: info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Caddy reverse proxy for production
  # The Caddyfile proxies to web:8081 (the internal service name + port)
  caddy:
    image: caddy:2-alpine
    container_name: voltfleet-prod-caddy
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      SITE_URL: ${SITE_URL:-localhost}
    depends_on:
      - web

volumes:
  pgdata_prod:
  redisdata_prod:
  uploads_prod:
  caddy_data:
  caddy_config:
