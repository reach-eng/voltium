version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: voltfleet-db
    restart: always
    environment:
      POSTGRES_USER: voltfleet_user
      POSTGRES_PASSWORD: voltfleet_secure_password
      POSTGRES_DB: voltfleet_prod
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U voltfleet_user -d voltfleet_prod']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: voltfleet-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: voltfleet-web
    restart: always
    ports:
      - '8081:8081'
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://voltfleet_user:voltfleet_secure_password@db:5432/voltfleet_prod?schema=public
      DATABASE_POOL_SIZE: '15'
      DATABASE_POOL_TIMEOUT: '30'
      JWT_SECRET: voltium-production-default-secret-key-32-chars-long
      UPSTASH_REDIS_REST_URL: http://redis:6379
      SMS_PROVIDER: mock
      STORAGE_PROVIDER: local
      NEXT_PUBLIC_ENABLE_REFERRAL: 'true'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
