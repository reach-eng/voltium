name: Windows E2E Tests (Playwright & Flutter)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.41.4'
  DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/voltium_test'
  JWT_SECRET: ${{ secrets.CI_JWT_SECRET }}

jobs:
  playwright-e2e:
    name: Playwright E2E Tests (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start PostgreSQL Service
        shell: pwsh
        run: |
          $service = Get-Service -Name postgresql* -ErrorAction SilentlyContinue
          if ($service) {
              Start-Service $service.Name
              Start-Sleep -Seconds 5
              $pgBin = Get-ChildItem "C:\Program Files\PostgreSQL\*\bin" -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($pgBin) {
                  $env:PATH += ";$($pgBin.FullName)"
              }
              # Configure user and db
              $env:PGPASSWORD = "postgres"
              psql -U postgres -c "ALTER USER postgres PASSWORD 'postgres';" -ErrorAction SilentlyContinue
              psql -U postgres -c "CREATE DATABASE voltium_test;" -ErrorAction SilentlyContinue
          }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps
        working-directory: ./web

      - name: Setup Prisma Database
        run: |
          npx prisma generate
          npx prisma migrate deploy
        working-directory: ./web

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
        working-directory: ./web

      - name: Run Playwright Tests
        run: npx playwright test
        working-directory: ./web
        env:
          JWT_SECRET: ${{ secrets.CI_JWT_SECRET }}

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  flutter-e2e:
    name: Flutter Android E2E Tests (Windows)
    runs-on: windows-latest


    steps:
      - uses: actions/checkout@v4

      - name: Start PostgreSQL Service (No Docker)
        shell: pwsh
        run: |
          $service = Get-Service -Name postgresql* -ErrorAction SilentlyContinue
          if (-not $service) {
            Write-Error "No native PostgreSQL service found on runner. DB-backed Flutter E2E cannot run."
            exit 1
          }
          Start-Service $service.Name
          Start-Sleep -Seconds 5
          $pgBin = Get-ChildItem "C:\Program Files\PostgreSQL\*\bin" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($pgBin) { $env:PATH += ";$($pgBin.FullName)" }
          $env:PGPASSWORD = "postgres"
          psql -U postgres -c "ALTER USER postgres PASSWORD 'postgres';" -ErrorAction SilentlyContinue
          psql -U postgres -c "CREATE DATABASE voltium_test;" -ErrorAction SilentlyContinue

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install backend dependencies
        run: npm ci --legacy-peer-deps
        working-directory: ./web

      - name: Setup database
        run: |
          npx prisma generate
          npx prisma migrate deploy
        working-directory: ./web
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Get Flutter dependencies
        run: flutter pub get
        working-directory: ./flutter

      - name: Start backend dev server
        run: |
          npm run dev &
          npx wait-on http://localhost:8081 --timeout 30000
        working-directory: ./web
        env:
          NODE_ENV: development

      - name: Run E2E on Windows Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_6
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          working-directory: ./flutter
          script: |
            flutter test integration_test/app_test.dart --dart-define=API_URL=http://localhost:8081 --timeout=none
